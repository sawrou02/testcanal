# Déploiement du BACKEND SENDISTRI sur Render (serveur Node qui tourne 24/7).
# Le frontend se déploie séparément sur Vercel.
#
# À faire dans Render : New + > Blueprint > choisir ce dépôt.
# Puis renseigner les 2 variables marquées "sync: false" :
#   - DATABASE_URL : l'URL PostgreSQL fournie par Neon (voir le guide)
#   - WEB_ORIGIN   : l'URL de ton site Vercel (ex. https://sendistri.vercel.app)
services:
  - type: web
    name: sendistri-api
    runtime: node
    rootDir: backend
    plan: free
    region: frankfurt # le plus proche de l'Afrique de l'Ouest
    buildCommand: npm install && npm run cloud:build && npm run cloud:deploy
    startCommand: npm run start:prod
    healthCheckPath: /api/region/config
    autoDeploy: true
    disk:
      name: sendistri-uploads
      mountPath: /var/data/uploads
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true # Render génère une clé sécurisée unique
      - key: UPLOADS_DIR
        value: /var/data/uploads
      - key: DATABASE_URL
        sync: false # ← colle ici l'URL PostgreSQL de Neon
      - key: WEB_ORIGIN
        sync: false # ← colle ici l'URL de ton site Vercel
