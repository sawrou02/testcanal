document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

m { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }\n  @keyframes scSlideL { from { opacity:0; transform:translateX(18px); } to { opacity:1; transform:none; } }\n  @keyframes scDraw { from { stroke-dashoffset:var(--len); } to { stroke-dashoffset:0; } }\n  input, select, button, textarea { font-family:inherit; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<sc-if value=\"{{ showLogin }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"min-height:100vh; display:flex; align-items:stretch; background:var(--bg); font-family:var(--font);\">\n    <div style=\"flex:1.1; position:relative; background:linear-gradient(155deg,#0B2A1B 0%,#0E3A24 55%,#0A6B3D 130%); display:flex; flex-direction:column; justify-content:space-between; padding:56px 64px; overflow:hidden;\">\n      <div style=\"position:absolute; right:-120px; top:-80px; width:520px; height:520px; border-radius:50%; background:radial-gradient(circle, rgba(226,160,0,0.16), transparent 62%);\"><\u002Fdiv>\n      <div style=\"position:absolute; left:-90px; bottom:-120px; width:420px; height:420px; border-radius:50%; background:radial-gradient(circle, rgba(210,58,44,0.14), transparent 62%);\"><\u002Fdiv>\n      <div style=\"position:relative; display:flex; align-items:center; gap:14px;\">\n        {{ brandStarLg }}\n        <div style=\"display:flex; flex-direction:column;\">\n          <span style=\"font-size:24px; font-weight:800; letter-spacing:.04em; color:#fff;\">SENDISTRI<\u002Fspan>\n          <span style=\"font-size:12.5px; font-weight:600; letter-spacing:.18em; color:#7FB394; text-transform:uppercase;\">Gestion Commerciale Télécom<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:relative;\">\n        <div style=\"width:64px; height:5px; border-radius:3px; display:flex; overflow:hidden; margin-bottom:26px;\">\n          <div style=\"flex:1; background:#0E8A4F;\"><\u002Fdiv><div style=\"flex:1; background:#E2A000;\"><\u002Fdiv><div style=\"flex:1; background:# .5 13.74 18.18 21.02 12 17.27 5.82 21.02 7.5 13.74 2 8.27 8.91 7.86 12 1\" fill=\"'+(starColor||'#fff')+'\"/><\u002Fg>'+\n      '<rect x=\"11\" y=\"40.5\" width=\"8.6\" height=\"3\" rx=\"1.5\" fill=\"#10A05B\"/><rect x=\"19.7\" y=\"40.5\" width=\"8.6\" height=\"3\" rx=\"1.5\" fill=\"#F2B600\"/><rect x=\"28.4\" y=\"40.5\" width=\"8.6\" height=\"3\" rx=\"1.5\" fill=\"#E2402F\"/>'\n    }});\n  }\n\n  // ---------- data ----------\n  build(){\n    const pdvs = ['Boutique Liberté 6','Agence Sandaga','Sous-Réseau Pikine','Boutique Parcelles','Agence Plateau','PDV Touba Sandaga','VAD Guédiawaye','Sous-Réseau Thiès','Boutique Mbour','Agence Saint-Louis','PDV Ziguinchor','Boutique Rufisque'];\n    const secteurs = ['Dakar Centre','Dakar Banlieue','Thiès','Petite Côte','Nord','Sud-Casamance'];\n    const noms = [['Fatou','Ndiaye'],['Mamadou','Sow'],['Aïssatou','Fall'],['Cheikh','Diallo'],['Awa','Mbaye'],['Ousmane','Ba'],['Mariama','Guèye'],['Modou','Sarr'],['Khady','Sy'],['Ibrahima','Faye'],['Ndèye','Sène'],['Abdou','Cissé'],['Rama','Diouf'],['Pape','Thiam'],['Bineta','Camara']];\n    const formules = [['ACCESS',5000],['EVASION',10000],['EVASIONP',15000],['TOUT CANAL',20000],['PRESTIGE',30000]];\n    return { pdvs, secteurs, noms, formules };\n  }\n  formuleLabel(code){ const f=this.store.formules.find(x=>x[0]===code); return f? (f[0]==='EVASIONP'?'ÉVASION+':f[0]) : code; }\n  formulePrice(code){ const f=this.store.formules.find(x=>x[0]===code); return f?f[1]:0; }\n\n  // cell factories\n  cTxt(s,opts){ opts=opts||{}; return { node:s, style:'padding:11px 16px; color:'+(opts.muted?'var(--text-3)':'var(--text)')+'; '+(opts.bold?'font-weight:700;':'')+(opts.mono?'font-family:var(--mono);':'')+(opts.right?'text-align:right;':'') }; }\n  cMoney(n,opts){ opts=opts||{}; return { node:this.fc(n)+' F', style:'padding:11px 16px; font-family:var(--mono); font-weight:600; text-align:right; color:'+(opts.color||'var(--text)') }; }\n  cBadge(label,kind){ const m={ok:['var(--green-l)','var(--green-d)'],warn:['var(--yellow-l)','var(--yellow-d)'],bad:['var(--red-l)','var(--red-d)'],info:['var(--blue-l)','var(--blue)'],neutral:['var(--surface-2)','var(--text-2)']}[kind]||['var(--surface-2)','var(--text-2)'];\n    return { node:this.h('span',{style:{background:m[0],color:m[1],fontSize:'11.5px',fontWeight:700,padding:'4px 10px',borderRadius:'8px',whiteSpace:'nowrap'}},label), style:'padding:11px 16px;' }; }\n  cBtns(arr){ return { node:this.h('div',{style:{display:'flex',gap:'6px'}}, arr.map((b,i)=>this.h('button',{key:i,onClick:(e)=>{e.stopPropagation(); b.fn&&b.fn();},style:{padding:'5px 11px',borderRadius:'7px',border:'1px solid '+(b.kind==='ok'?'var(--green)':b.kind==='bad'?'var(--red)':'var(--border-strong)'),background:b.kind==='ok'?'var(--green-l)':b.kind==='bad'?'var(--red-l)':'var(--surface)',color:b.kind==='ok'?'var(--green-d)':b.kind==='bad'?'var(--red-d)':'var(--text-2)',fontSize:'12px',fontWeight:700,cursor:'pointer'}},b.label))), style:'padding:9px 16px;' }; }\n\n  // ---------- table configs ----------\n  tableFor(route){\n    const S=this.store; const pad='padding:10px 16px; font-size:11px; text-transform:uppercase; letter-spacing:.04em; font-weight:700; color:var(--text-3);';\n    const col=(l,r)=>({label:l, style:pad+(r?' text-align:right;':' text-align:left;')});\n    const statuses = {ACTIF:'ok',ECHU:'bad',SUSPENDU:'warn',VALIDE:'ok',EN_ATTENTE:'warn',REJETE:'bad'};\n\n    // PDV list\n    if(route==='param-pdv'||route==='param-pdvliste'){\n      const types=['BOUTIQUE_PROPRE','SOUS_RESEAU','AGENCE_PRINCIPALE','VAD'];\n      const rows = S.pdvs.map((p,i)=>{\n        const code='PDV-'+(1024+i); const t=types[i%4]; const solde=(i%3===0?-1:1)*(820000+i*143000);\n        const caution=1500000+i*250000; const sec=S.secteurs[i%S.secteurs.length];\n        const r={ cells:[ this.cTxt(code,{mono:true,muted:true}), this.cTxt(p,{bold:true}), this.cBadge(t.replace('_',' '),'neutral'), this.cTxt(sec), this.cMoney(caution), this.cMoney(solde,{color:
